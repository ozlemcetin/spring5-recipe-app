<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Recipe App</title>
</head>
<body>
<h1>Recipe List</h1>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Description</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="recipe : ${recipes}">
        <!--/*@thymesVar id="recipe type="guru.springframework.spring5recipeapp.domain.Recipe"*/-->
        <td th:text="${recipe.id}">334</td>
        <td th:text="${recipe.description}">Tasty Goodness 3</td>
    </tr>
    </tbody>
</table>

</body>
</html>
