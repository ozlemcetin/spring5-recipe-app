<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ingredient Form</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous"
          th:href="@{/webjars/bootstrap/3.3.7-1/css/bootstrap.min.css}">

    <script src="/webjars/jquery/3.4.1/jquery.min.js"></script>

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"
            integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
            crossorigin="anonymous"
            th:href="@{/webjars/bootstrap/3.3.7-1/js/bootstrap.min.js}"></script>


</head>
<body>

<!--/*@thymesVar id="ingredientCommand type="guru.springframework.spring5recipeapp.commands.IngredientCommand"*/-->
<!--/*@thymesVar id="unitOfMeasureCommands type="guru.springframework.spring5recipeapp.commands.UnitOfMeasureCommand"*/-->

<div class="container-fluid" style="margin-top: 20px">

    <div class="row">
        <div class="col-md-6 col-md-offset-3">

            <form th:object="${ingredientCommand}"
                  th:action="@{'/recipe/' + ${ingredientCommand.recipeId} + '/ingredient'}" method="post">

                <input type="hidden" th:field="*{id}">


                <!--panel-group-->
                <div class="panel-group">

                    <!--panel-primary-->
                    <div class="panel panel-primary">

                        <div class="panel-heading">
                            <h1 class="panel-title">Edit Ingredient Information</h1>
                        </div>

                        <div class="panel-body">

                            <!-- row -->
                            <div class="row">

                                <div class="col-md-3 form-group">
                                    <label>Description</label>
                                    <input type="text" class="form-control" th:field="*{description}">
                                </div>

                                <div class="col-md-3 form-group">
                                    <label>Amount</label>
                                    <input type="number" class="form-control" th:field="*{amount}">
                                </div>

                                <div class="col-md-3 form-group">
                                    <label>Unit of Measure</label>
                                    <select class="form-control" th:field="*{unitOfMeasureCommand.id}">
                                        <option th:each="uomcs : ${unitOfMeasureCommands}"
                                                th:value="${uomcs.id}"
                                                th:text="${uomcs.description}"
                                                th:selected="${uomcs.id.equals(ingredientCommand.unitOfMeasureCommand.id)}">
                                            Each
                                        </option>
                                    </select>
                                </div>

                            </div>
                            <!-- row -->

                        </div>

                    </div>
                    <!--panel-primary-->

                    <div>
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>

                </div>
                <!--panel-group-->

            </form>

        </div>
    </div>

</div>
</body>
</html>
