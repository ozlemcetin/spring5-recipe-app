<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ingredients</title>

    <!-- Latest compiled and minified CSS -->
    <link rel="stylesheet"
          href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css"
          integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u"
          crossorigin="anonymous"
          th:href="@{/webjars/bootstrap/3.3.7-1/css/bootstrap.min.css}">

    <script src="/webjars/jquery/3.4.1/jquery.min.js"></script>

    <!-- Latest compiled and minified JavaScript -->
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/js/bootstrap.min.js"
            integrity="sha384-Tc5IQib027qvyjSMfHjOMaLkfuWVxZxUPnCJA7l2mCWNIpG9mGCD8wGNIcPD7Txa"
            crossorigin="anonymous"
            th:href="@{/webjars/bootstrap/3.3.7-1/js/bootstrap.min.js}"></script>


</head>
<body>

<!--/*@thymesVar id="recipeCommand type="guru.springframework.spring5recipeapp.commands.RecipeCommand"*/-->

<div class="container-fluid" style="margin-top: 20px">

    <div class="row">
        <div class="col-md-6 col-md-offset-3">

            <!--panel-primary-->
            <div class="panel panel-primary">

                <div class="panel-heading">
                    <h1 class="panel-title">Ingredients List</h1>
                </div>

                <div class="panel-body">

                    <div class="table-responsive" th:if="${not #lists.isEmpty(recipeCommand.ingredientCommands)}">
                        <table class="table table-hover ">
                            <thead class="thead-inverse">
                            <tr>
                                <th>ID</th>
                                <th>Description</th>
                                <th>View</th>
                                <th>Update</th>
                                <th>Delete</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:remove="all">
                                <td>123</td>
                                <td>Ingredient 1</td>
                                <td><a href="#">View</a></td>
                                <td><a href="#">Update</a></td>
                                <td><a href="#">Delete</a></td>
                            </tr>
                            <tr th:remove="all">
                                <td>123</td>
                                <td>Ingredient 2</td>
                                <td><a href="#">View</a></td>
                                <td><a href="#">Update</a></td>
                                <td><a href="#">Delete</a></td>
                            </tr>
                            <tr th:each="ic : ${recipeCommand.ingredientCommands}">
                                <td th:text="${ic.id}">123</td>
                                <td th:text="${ic.amount}
                                    + ' ' + ${ic.unitOfMeasureCommand.description}
                                    + ' ' + ${ic.description}">Ingredient 3
                                </td>
                                <td><a href="#"
                                       th:href="@{'/recipe/' + ${recipeCommand.id} + '/ingredient/' + ${ic.id} + '/show' }">View</a>
                                </td>
                                <td><a href="#"
                                       th:href="@{'/recipe/' + ${recipeCommand.id} + '/ingredient/' + ${ic.id} + '/update' }">Update</a>
                                </td>
                                <td><a href="#"
                                       th:href="@{'/recipe/' + ${recipeCommand.id} + '/ingredient/' + ${ic.id} + '/delete' }">Delete</a>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>

                </div>

            </div>
            <!--panel-primary-->

            <div>
                <a href="#" class="btn btn-default"
                   th:href="@{'/recipe/' + ${recipeCommand.id} + '/update' }" role="button">Back to Recipe
                    Form</a>
            </div>

        </div>
    </div>

</div>
</body>
</html>
